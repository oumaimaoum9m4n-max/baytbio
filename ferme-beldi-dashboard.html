<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Syanti — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ─────────── TOKENS ─────────── */
:root{
  --bg:#F2F4FB;
  --surface:#FFFFFF;
  --surface2:#F7F8FD;
  --border:#E3E7F2;
  --border2:#CDD3E8;
  --gold:#C9933A;
  --gold-l:#E0AA55;
  --gold-dim:#FFF6EA;
  --gold-dim2:#FEEFD4;
  --text:#1A1E2E;
  --muted:#6C7283;
  --muted2:#9CA3B8;
  --green:#1E9E5E;
  --green-bg:#EAF7F1;
  --red:#C03232;
  --red-bg:#FDEAEA;
  --warn:#B87000;
  --warn-bg:#FFF4DE;
  --blue:#2960C0;
  --blue-bg:#EBF1FC;
  --gray-bg:#F0F1F5;
  --gray:#6C7283;
  --sidebar-w:230px;
  --topbar-h:58px;
  --r:8px; --r-lg:12px; --r-sm:5px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.09),0 8px 32px rgba(0,0,0,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:14px}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:9px}
button{font-family:'IBM Plex Sans',sans-serif;cursor:pointer}
input,select,textarea{font-family:'IBM Plex Sans',sans-serif}
a{text-decoration:none;color:inherit}

/* ─────────── LAYOUT ─────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ─────────── SIDEBAR ─────────── */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  z-index:10;
}
.sidebar-logo{
  padding:18px 20px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:34px;height:34px;background:var(--gold);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text)}
.logo-text em{font-style:normal;color:var(--gold)}
.sidebar-nav{flex:1;padding:12px 0}
.nav-label{
  font-size:10px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--muted2);
  padding:16px 20px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 20px;font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;border-left:3px solid transparent;
  transition:all .15s;border-radius:0;
  user-select:none;
}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{
  background:var(--gold-dim);color:var(--gold);
  border-left-color:var(--gold);font-weight:600;
}
.nav-item.active svg{opacity:1}
.sidebar-footer{
  padding:14px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.avatar-sm{
  width:32px;height:32px;border-radius:50%;
  background:var(--gold-dim2);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.avatar-name{font-size:12px;font-weight:600}
.avatar-role{font-size:11px;color:var(--muted)}

/* ─────────── MAIN ─────────── */
#main-wrapper{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* topbar */
#topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;gap:16px;
}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.breadcrumb .bc-sep{color:var(--muted2)}
.breadcrumb .bc-current{color:var(--text);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-search{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 12px;font-size:13px;color:var(--muted);
  width:220px;
}
.topbar-search input{
  background:none;border:none;outline:none;font-size:13px;
  color:var(--text);width:100%;
}
.topbar-search input::placeholder{color:var(--muted2)}
.icon-btn{
  width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;color:var(--muted);
}
.icon-btn:hover{background:var(--border);color:var(--text)}

/* ─────────── CONTENT ─────────── */
#content{flex:1;overflow-y:auto;padding:24px}

/* ─────────── PAGE HEADER ─────────── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.page-title h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:2px}
.page-title p{font-size:13px;color:var(--muted)}
.btn-add{
  display:flex;align-items:center;gap:7px;
  background:var(--gold);color:#fff;border:none;
  padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-add:hover{background:var(--gold-l);transform:translateY(-1px)}

/* ─────────── KPI CARDS ─────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:20px;
  display:flex;align-items:flex-start;justify-content:space-between;
  box-shadow:var(--shadow);
}
.kpi-body{}
.kpi-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-value{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;margin-bottom:6px}
.kpi-sub{font-size:11px;color:var(--muted)}
.kpi-icon{
  width:40px;height:40px;border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.kpi-icon.gold{background:var(--gold-dim);color:var(--gold)}
.kpi-icon.green{background:var(--green-bg);color:var(--green)}
.kpi-icon.blue{background:var(--blue-bg);color:var(--blue)}
.kpi-icon.red{background:var(--red-bg);color:var(--red)}

/* ─────────── CARDS ─────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);
}
.card-title{font-size:14px;font-weight:600}
.card-count{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:99px;padding:2px 10px;font-size:12px;color:var(--muted);
}

/* ─────────── TABLE ─────────── */
.table-toolbar{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 12px;min-width:200px;
}
.search-box input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%}
.search-box input::placeholder{color:var(--muted2)}
.filter-sel{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:7px 12px;font-size:13px;color:var(--text);
  outline:none;cursor:pointer;
}
.filter-sel:focus{border-color:var(--gold)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  padding:10px 16px;text-align:left;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
th:first-child{padding-left:20px}
th:last-child{padding-right:20px}
td{
  padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);
  vertical-align:middle;
}
td:first-child{padding-left:20px}
td:last-child{padding-right:20px}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold)}
.td-sub{font-size:11px;color:var(--muted);margin-top:2px}
.empty-row td{text-align:center;padding:40px;color:var(--muted)}

/* actions */
.row-actions{display:flex;align-items:center;gap:6px}
.act-btn{
  width:28px;height:28px;border-radius:var(--r-sm);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;background:transparent;
}
.act-btn.edit{color:var(--blue)}
.act-btn.edit:hover{background:var(--blue-bg)}
.act-btn.del{color:var(--red)}
.act-btn.del:hover{background:var(--red-bg)}

/* ─────────── PILLS ─────────── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:600;white-space:nowrap;
}
.pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.pill-green{background:var(--green-bg);color:var(--green)}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-warn{background:var(--warn-bg);color:var(--warn)}
.pill-blue{background:var(--blue-bg);color:var(--blue)}
.pill-gray{background:var(--gray-bg);color:var(--gray)}

/* ─────────── DASHBOARD OVERVIEW ─────────── */
.overview-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-top:0}
@media(max-width:1000px){.overview-grid{grid-template-columns:1fr}}
.status-bar-list{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.sbar-item{display:flex;align-items:center;gap:10px;font-size:13px}
.sbar-label{flex:1;color:var(--muted)}
.sbar-track{flex:2;height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px}
.sbar-count{font-weight:600;font-size:13px;min-width:20px;text-align:right}

/* ─────────── MODAL ─────────── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(20,24,40,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#modal-overlay.open{opacity:1;pointer-events:all}
#modal{
  background:var(--surface);border-radius:var(--r-lg);
  box-shadow:var(--shadow-md);width:100%;max-width:560px;
  max-height:90vh;display:flex;flex-direction:column;
  transform:translateY(12px);transition:transform .2s;
}
#modal-overlay.open #modal{transform:translateY(0)}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);
}
.modal-header h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.modal-close-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--surface2);color:var(--muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;
}
.modal-close-btn:hover{background:var(--border);color:var(--text)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{
  display:flex;justify-content:flex-end;gap:10px;
  padding:16px 22px;border-top:1px solid var(--border);
}
.btn-cancel{
  padding:8px 18px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface2);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:all .15s;
}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-save{
  padding:8px 20px;border-radius:var(--r);border:none;
  background:var(--gold);color:#fff;font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;
}
.btn-save:hover{background:var(--gold-l)}

/* ─────────── FORM ─────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;font-weight:600;color:var(--text)}
.form-group span.req{color:var(--red)}
.form-control{
  padding:9px 12px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--surface2);
  font-size:13px;color:var(--text);outline:none;
  transition:border-color .15s;width:100%;
}
.form-control:focus{border-color:var(--gold);background:#fff}
.form-control.error{border-color:var(--red)}
.form-error{font-size:11px;color:var(--red);margin-top:2px}
select.form-control{cursor:pointer}

/* ─────────── TOAST ─────────── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:2000;
  background:var(--text);color:#fff;
  padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:500;
  box-shadow:var(--shadow-md);
  transform:translateY(8px);opacity:0;
  transition:all .25s;pointer-events:none;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#1A6B42}
#toast.error{background:var(--red)}

/* ─────────── CONFIRM DIALOG ─────────── */
#confirm-overlay{
  position:fixed;inset:0;background:rgba(20,24,40,.45);
  display:flex;align-items:center;justify-content:center;z-index:2000;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#confirm-overlay.open{opacity:1;pointer-events:all}
#confirm-box{
  background:var(--surface);border-radius:var(--r-lg);
  box-shadow:var(--shadow-md);padding:28px 28px 20px;
  max-width:380px;width:90%;text-align:center;
}
#confirm-box h4{font-size:16px;font-weight:700;margin-bottom:10px}
#confirm-box p{font-size:13px;color:var(--muted);margin-bottom:24px}
.confirm-actions{display:flex;gap:10px;justify-content:center}
.btn-danger{
  padding:8px 20px;border-radius:var(--r);border:none;
  background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-danger:hover{opacity:.88}
</style>
</head>

const getSociete = id => DB.societes.find(s=>s.id===id);
const getUser    = id => DB.users.find(u=>u.id===id);
const getMarche  = id => DB.marches.find(m=>m.id===id);
const getSite    = id => DB.sites.find(s=>s.id===id);
const nextId     = entity => DB._nextId[entity]++;

function userName(id){ const u=getUser(id); return u?`${u.prenom} ${u.nom}`:'—' }
function societeName(id){ const s=getSociete(id); return s?s.nom:'—' }
function siteName(id){ const s=getSite(id); return s?s.nom:'—' }
function marcheNum(id){ const m=getMarche(id); return m?m.numMarche:'—' }

function fmt(n){ return Number(n).toLocaleString('fr-FR') }

function statusPill(status){
  const map = {
    'En cours':   'pill-green',
    'Notifié':    'pill-blue',
    'Suspendu':   'pill-warn',
    'En retard':  'pill-red',
    'Clôturé':    'pill-gray',
    'Conforme':   'pill-green',
    'Non conforme':'pill-red',
    'En maintenance':'pill-warn',
    'Actif':      'pill-blue',
    'Inactif':    'pill-gray',
    'Admin':      'pill-blue',
    'Chef de projet':'pill-green',
    'Technicien': 'pill-gray',
  };
  return `<span class="pill ${map[status]||'pill-gray'}">${status}</span>`;
}

function ht(b){ return b.prixUnitaire * b.quantite }
function ttc(b){ return ht(b)*(1+b.tva/100) }

const breadcrumbs = {
  dashboard:'Tableau de bord', users:'Utilisateurs', societes:'Sociétés',
  marches:'Marchés', bordereaux:'Bordereaux de prix', sites:'Sites', equipements:'Équipements'
};

function navigate(view){
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view===view);
  });
  document.getElementById('breadcrumb').innerHTML =
    `<span>Syanti</span><span class="bc-sep">›</span><span class="bc-current">${breadcrumbs[view]}</span>`;
  document.getElementById('global-search').value='';
  renderView();
}

document.getElementById('sidebar-nav').addEventListener('click', e=>{
  const item = e.target.closest('.nav-item');
  if(item && item.dataset.view) navigate(item.dataset.view);
});

function renderView(){
  const el = document.getElementById('content');
  const renderers = {
    dashboard:   renderDashboard,
    users:       renderUsers,
    societes:    renderSocietes,
    marches:     renderMarches,

    sites:       renderSites,
    equipements: renderEquipements,
  };
  el.innerHTML = (renderers[currentView]||renderDashboard)();
}

function renderBordereaux(filter='', marcheFilter=''){
  let data = DB.bordereaux.filter(b=>!filter||
    b.numArticle.toLowerCase().includes(filter)||b.designation.toLowerCase().includes(filter));
  if(marcheFilter) data = data.filter(b=>b.marcheId===parseInt(marcheFilter));

  const rows = data.length ? data.map(b=>{
    const htVal  = ht(b);
    const ttcVal = ttc(b);
    return `
    <tr>
      <td><span class="mono">${b.numArticle}</span></td>
      <td><span class="mono" style="font-size:11px">${marcheNum(b.marcheId)}</span></td>
      <td>${b.designation}</td>
      <td>${b.unite}</td>
      <td>${fmt(b.prixUnitaire)} DH</td>
      <td>${fmt(b.quantite)}</td>
      <td>${b.tva}%</td>
      <td style="font-weight:600">${fmt(htVal)} DH</td>
      <td style="font-weight:600;color:var(--gold)">${fmt(ttcVal.toFixed(0))} DH</td>
      <td><div class="row-actions">
        <button class="act-btn edit" onclick="openModal('bordereaux',${b.id})" title="Modifier">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="act-btn del" onclick="confirmDelete('bordereaux',${b.id})" title="Supprimer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div></td>
    </tr>`}).join('') : `<tr class="empty-row"><td colspan="10">Aucun bordereau trouvé.</td></tr>`;

  const marcheOpts = ['',...DB.marches.map(m=>m.id)].map(id=>
    `<option value="${id}" ${String(id)===marcheFilter?'selected':''}>${id?marcheNum(id):'Tous les marchés'}</option>`).join('');

  const totalHT  = data.reduce((s,b)=>s+ht(b),0);
  const totalTTC = data.reduce((s,b)=>s+ttc(b),0);

  return `
  <div class="page-header">
    <div class="page-title"><h1>Bordereaux de prix</h1><p>${DB.bordereaux.length} articles au total</p></div>

      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter un article
    </button>
  </div>
  <div class="card">
    <div class="table-toolbar">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="N° article, désignation…" id="search-bordereaux"
          oninput="renderAndPatch('bordereaux',this.value.toLowerCase(),document.getElementById('marche-filter-b').value)"/>
      </div>
      <select class="filter-sel" id="marche-filter-b"
        onchange="renderAndPatch('bordereaux',document.getElementById('search-bordereaux').value.toLowerCase(),this.value)">
        ${marcheOpts}

      <table>
        <thead><tr><th>Art.</th><th>Marché</th><th>Désignation</th><th>Unité</th><th>P.U (DH)</th><th>Quantité</th><th>TVA</th><th>Total HT</th><th>Total TTC</th><th>Actions</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderAndPatch(view, filter, extra=''){
  const renderers = {
    users: renderUsers, marches: renderMarches,
    bordereaux: renderBordereaux, sites: renderSites, equipements: renderEquipements
  };
  if(renderers[view]) document.getElementById('content').innerHTML = renderers[view](filter, extra);
}

function handleGlobalSearch(val){
  if(!val){ return; }
  // navigate to marchés and search
  navigate('marches');
  setTimeout(()=>{
    const el=document.getElementById('search-marches');
    if(el){el.value=val; renderAndPatch('marches',val.toLowerCase(),'');}
  },50);
}

function openModal(entity, id=null){
  modalEntity = entity; modalEditId = id;
  const titles = {
    societes:'société',users:'utilisateur',marches:'marché',
    bordereaux:'bordereau de prix',sites:'site',equipements:'équipement'
  };
  document.getElementById('modal-title').textContent =
    (id ? 'Modifier le ' : 'Ajouter un ') + titles[entity];

  const item = id ? DB[entity].find(x=>x.id===id) : null;
  document.getElementById('modal-body').innerHTML = formHTML(entity, item);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  modalEntity=null; modalEditId=null;
}

   SAVE ENTITY
════════════════════════════════ */
function getField(id){ const el=document.getElementById(id); return el?el.value.trim():undefined; }
function getNumField(id){ const el=document.getElementById(id); return el?Number(el.value):undefined; }

function saveEntity(){
  const e = modalEntity; let data={};

  if(e==='societes'){
    const nom=getField('f-nom');
    if(!nom){shake();return;}
    data={nom,siegeSocial:getField('f-siegeSocial'),rib:getField('f-rib'),ice:getField('f-ice'),cnss:getField('f-cnss'),rcNum:getField('f-rcNum'),rcEmplacement:getField('f-rcEmplacement')};
  }
  else if(e==='users'){
    const prenom=getField('f-prenom'),nom=getField('f-nom'),email=getField('f-email');
    if(!prenom||!nom||!email){shake();return;}
    const pw=getField('f-password');
    data={prenom,nom,email,role:getField('f-role'),societeId:getNumField('f-societeId')};
    if(pw) data.password=pw;
    else if(!modalEditId){shake();return;}
    else { const cur=DB.users.find(x=>x.id===modalEditId); data.password=cur.password; }
  }
  else if(e==='marches'){
    const objet=getField('f-objet'),numMarche=getField('f-numMarche');
    if(!objet||!numMarche){shake();return;}
    data={objet,numMarche,anneeBudgetaire:getField('f-anneeBudgetaire'),status:getField('f-status'),
      chefDeProjetId:getNumField('f-chefDeProjetId'),dateOrdreService:getField('f-dateOrdreService'),
      delaiExecution:getNumField('f-delaiExecution'),societeId:getNumField('f-societeId')};
  }
  else if(e==='bordereaux'){
    const numArticle=getField('f-numArticle'),designation=getField('f-designation');
    if(!numArticle||!designation){shake();return;}
    data={numArticle,designation,unite:getField('f-unite'),
      prixUnitaire:getNumField('f-prixUnitaire'),quantite:getNumField('f-quantite'),
      tva:getNumField('f-tva'),marcheId:getNumField('f-marcheId')};
  }
  else if(e==='sites'){
    const nom=getField('f-nom'),code=getField('f-codeReference');
    if(!nom||!code){shake();return;}
    data={nom,codeReference:code,type:getField('f-type')};
  }
  else if(e==='equipements'){
    const nom=getField('f-nomEquipement');
    if(!nom){shake();return;}
    data={nomEquipement:nom,numero:getField('f-numero'),status:getField('f-status'),siteId:getNumField('f-siteId')};
  }

  if(modalEditId){
    const idx=DB[e].findIndex(x=>x.id===modalEditId);
    if(idx>-1) DB[e][idx]={...DB[e][idx],...data};
    showToast('Modification enregistrée ✓','success');
  } else {
    const id=nextId(e);
    DB[e].push({id,...data});
    showToast('Élément ajouté ✓','success');
  }
  closeModal();
  renderView();
}

function shake(){
  const m=document.getElementById('modal');
  m.style.transform='translateX(-8px)';
  setTimeout(()=>m.style.transform='translateX(8px)',80);
  setTimeout(()=>m.style.transform='',160);
  showToast('Veuillez remplir les champs obligatoires.','error');
}

/* ════════════════════════════════
   DELETE
════════════════════════════════ */
function confirmDelete(entity, id){
  confirmCallback=()=>{ doDelete(entity,id); };
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-ok').onclick=()=>{
    confirmCallback(); closeConfirm();
  };
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('open'); }
function doDelete(entity, id){
  DB[entity]=DB[entity].filter(x=>x.id!==id);
  showToast('Supprimé avec succès.','success');
  renderView();
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
let toastTimer;
function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.className=''; },3000);
}

/* ════════════════════════════════
   CLOSE ON OVERLAY CLICK
════════════════════════════════ */
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('confirm-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('confirm-overlay')) closeConfirm();
});

/* ════════════════════════════════
   INIT
════════════════════════════════ */
renderView();
</script>
